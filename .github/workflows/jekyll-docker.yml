name: Jekyll site CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Cache gems
        uses: actions/cache@v4
        with:
          path: vendor/bundle
          key: ${{ runner.os }}-gems-${{ hashFiles('**/Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-gems-

      - name: Install dependencies
        run: |
          gem install bundler -v 2.4.13 || true
          bundle config set path 'vendor/bundle'
          bundle install --jobs 4 --retry 3

      - name: Build the Jekyll site
        run: |
          bundle exec jekyll build --future --trace

      - name: Run jekyll doctor (optional)
        run: |
          if bundle exec jekyll doctor --version >/dev/null 2>&1; then
            bundle exec jekyll doctor || true
          fi

      - name: Upload _site artifact
        uses: actions/upload-artifact@v4
        with:
          name: jekyll-site
          path: _site
